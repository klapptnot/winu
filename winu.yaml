inactive_timeout: 10000     # Time before switching back to clock, in ms

installation:
  root: "/usr/share/sddm/themes/winu"  # Where theme is going to get installed
  source: "/home/user/repos/winu"      # Cloned repo for sources
  wayland: true         # Enable wayland support
  optional_deps: true   # Dynamic theming deps
  compositor_deps: true # VT1-wake-up compositor wrapper (wayland only)

background:
  use_video: false          # Use video wallpapers if any (looping)
  blur: 40                  # Blur strength applied to surfaces (0 == off)
  sources:                  # Static image or video sources for wallpaper rotation
    - "/home/user/.local/share/backgrounds/bg_01.jpg"
    - "/home/user/.local/share/backgrounds/bg_02.webm"
    - "/home/user/.local/share/backgrounds/bg_03.jpg"
  carousel:
    enabled: false          # Automatically rotates wallpapers
    interval: 30000         # Interval between wallpaper changes in ms

colors:
  matugen:
    enabled: true           # Enables dynamic theming from wallpaper colors
    on_video: true          # Allow extracting colors from video frames too
    fallback: "#ff4fa3"     # Fallback color if extraction from media fails
    options:
      prefer: saturation    # Color generation strategy used by matugen (matugen --help)
      mode: dark            # Base theme mode; dark or light (matugen --help)

  palette:       # Theme used as matugen fallback, or if it is disabled
    background: "#120812"
    onBackground: "#ffeaf4"
    primary: "#ff4fa3"
    onPrimary: "#2a0015"
    primaryContainer: "#3a0b24"
    surface: "#1a0f1c"
    onSurface: "#f2d6e6"
    surfaceVariant: "#24121f"
    onSurfaceVariant: "#e7c7d6"
    outline: "#6b3a55"

avatar:
  custom: null   # Custom avatar image path. Must be 192x192
  filled: true   # Forces solid background behind avatar
  static: false  # Prevents avatar from changing with matugen

fonts:
  trust_blindly: false                 # Skip checking if font family exists in system
  primary: "Sora"                      # Main UI font used across the system
  segoe_ui: "Segoe Fluent Icons"       # Icon font required for UI symbols and indicators
  meiryo_boot: "Meiryo Boot"           # Icon font required for spinner animation

compositor:    # Wrapper for compositor to enable wake up greeter after manual switch to VT1
  timeout: 15  # Timout in seconds, to stop compositor after switching out of VT1
  command: "cage"
  args:
    - "-s"
    - "-d"
